<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Buzzer</title>

  <!-- Google Fonts: Space Grotesk for headings, Inter for body, IBM Plex Mono for the timer -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- ============ SCREEN 1: CATEGORY SELECT ============ -->
    <section id="categories-screen" class="screen active">
      <header class="app-header">
        <p class="eyebrow">Round 1</p>
        <h1>Pick your category</h1>
        <p class="subtitle">5 questions. 15 seconds each. No pressure.</p>
      </header>

      <div id="category-list" class="category-grid"></div>
    </section>

    <!-- ============ SCREEN 2: QUIZ ============ -->
    <section id="quiz-screen" class="screen">
      <div class="quiz-top-bar">
        <div class="progress-info">
          <p class="eyebrow" id="quiz-category-label">Category</p>
          <p id="question-counter">Question 1 of 5</p>
        </div>

        <div class="timer" id="timer">
          <span id="timer-value">15</span>
        </div>
      </div>

      <div class="question-card">
        <h2 id="question-text">Question text goes here</h2>
        <div id="answers-list" class="answers-grid"></div>
      </div>

      <p id="feedback" class="feedback"></p>
    </section>

    <!-- ============ SCREEN 3: RESULTS ============ -->
    <section id="results-screen" class="screen">
      <header class="app-header">
        <p class="eyebrow">Final score</p>
        <h1 id="results-score">0 / 5</h1>
        <p class="subtitle" id="results-message">Nice round.</p>
        <p class="best-score" id="best-score-line"></p>
      </header>

      <div class="results-actions">
        <button id="retry-btn" class="btn btn-secondary">Try this category again</button>
        <button id="menu-btn" class="btn btn-primary">Back to categories</button>
      </div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
